<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quartermaster Command: Steel Logistics v5.0</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f0f12">
</head>
<body class="dark-theme">

<div class="dashboard">
    <div class="sidebar">
        <div class="module">
            <div class="module-header" id="ui_interface">Interface & Sync</div>
            <button class="btn-theme" onclick="app.toggleTheme()">☀️ / 🌙 Toggle Theme</button>
            <div class="input-row">
                <select id="mode" onchange="app.handleModeChange()" style="width: 100%; margin-bottom: 5px;">
                    <option value="units">Units</option>
                    <option value="stacks">Stacks (10k)</option>
                </select>
            </div>
            <div class="input-row" style="gap: 5px;">
                <button class="btn-stack" onclick="app.exportState()" style="width: 50%;">Export Guild Data</button>
                <button class="btn-stack" onclick="app.importState()" style="width: 50%; background: var(--text-dim);">Import</button>
            </div>
        </div>

        <div class="module">
            <div class="module-header" id="ui_prodCmd">Production Command</div>
            <div class="input-row">
                <label>Target Steel</label>
                <div style="display:flex; gap: 5px;">
                    <input type="number" id="targetSteel" value="7000" oninput="app.run()">
                    <button class="btn-stack" onclick="app.calculateMax()" style="min-width: auto;">⚡ Max</button>
                </div>
            </div>
            <div class="input-row"><label>Crafters</label><input type="number" id="crafters" value="1" oninput="app.run()"></div>
        </div>

        <div class="module">
            <div class="module-header" id="ui_yieldMods">Yield Modifiers</div>
            <div class="input-row"><label>Mastery (+6%)</label><input type="checkbox" id="modMast" onchange="app.run()" checked></div>
            <div class="input-row"><label>Refining (+3%)</label><input type="checkbox" id="modRef" onchange="app.run()" checked></div>
            <div class="input-row"><label>Extraction (+3%)</label><input type="checkbox" id="modExt" onchange="app.run()" checked></div>
        </div>

        <div class="module">
            <div class="module-header" id="ui_logStats">Logistics Stats</div>
            <div class="input-row"><span>Total Gather Stacks:</span> <span id="statStacks" class="stat-val">0.00</span></div>
        </div>
        
        <button class="btn-stack" onclick="app.copyDiscord()" style="width:100%; padding:12px; font-size:13px;">📋 Copy Discord Order</button>
        <div id="saveStatus" style="text-align:center; margin-top:10px; font-size:11px; color:var(--text-dim);">System Ready</div>
    </div>

    <div class="main">
        <div class="module">
            <div class="module-header"><span>Inventory Bank</span> <button class="btn-stack btn-danger" onclick="app.clearAll()">Reset All Values</button></div>
            <table class="bank-table" id="bankTable"></table>
        </div>

        <div class="module">
            <div class="module-header" id="ui_defGather">Deficit to Gather</div>
            <div id="gatherOutput" class="logistics-grid"></div>
        </div>

        <div class="module">
            <div class="module-header" id="ui_mfgPipe">Manufacturing Pipeline</div>
            <div id="stepsOutput"></div>
        </div>
    </div>
</div>

<script src="config.js"></script>
<script src="engine.js"></script>
<script src="app.js"></script>
</body>
</html>
